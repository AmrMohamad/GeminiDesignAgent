name: Trusted Gemini Smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: Live Gemini smoke (trusted events only)
    runs-on: ubuntu-24.04
    env:
      CODEX_HOME: ${{ runner.temp }}/codex-home

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Swift
        uses: swift-actions/setup-swift@3aed395c5397f62deb91d8fe7af1418a9ae4d16f # v2.1.0
        with:
          swift-version: "6.1"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Swift version
        run: swift --version

      - name: Python version
        run: python --version

      - name: Require trusted Gemini credential
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          test -n "$GEMINI_API_KEY" || {
            echo "Repository secret GEMINI_API_KEY is required for the trusted live smoke workflow." >&2
            exit 1
          }

      - name: Run live interaction smoke test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDA_LIVE_GEMINI_TESTS: "1"
          GDA_LIVE_GEMINI_MODEL: gemini-2.5-flash
        run: swift test --filter GeminiLiveSmokeTests

      - name: Install managed skill bundle
        run: python scripts/install_skill.py --codex-home "${{ env.CODEX_HOME }}"

      - name: Run installed two-pass memory smoke
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/smoke_installed_skill.py --skill-dir "${{ env.CODEX_HOME }}/skills/gemini-design-agent"

      - name: Run public live design-quality evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: >-
          python scripts/evaluate_design_quality.py
          --mode live
          --corpus public
          --skill-dir "${{ env.CODEX_HOME }}/skills/gemini-design-agent"
          --output evals/design-quality/results/live-report.json

      - name: Upload redacted quality report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gda-live-quality-report
          path: evals/design-quality/results/live-report.json
          if-no-files-found: warn
          retention-days: 14
