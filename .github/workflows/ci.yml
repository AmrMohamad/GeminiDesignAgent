name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift and wrapper tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2022]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure temporary Codex home
        shell: bash
        run: echo "CODEX_HOME=${RUNNER_TEMP}/codex-home" >> "$GITHUB_ENV"

      - name: Set up Swift (macOS and Ubuntu)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "6.1.0"

      - name: Set up Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@eeda069c5bc95ac8a9ac5cea7d4f588ae5420ca5 # v0.4.0
        with:
          swift-version: swift-6.1-release
          swift-build: 6.1-RELEASE

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Swift version
        run: swift --version

      - name: Python version
        run: python --version

      - name: Swift tests
        run: swift test

      - name: Warning-clean release build
        run: python scripts/build_with_warning_audit.py --configuration release

      - name: Python compile
        run: python -m compileall -q skills/gemini-design-agent scripts Tests

      - name: Python wrapper tests
        run: python -m unittest discover -s skills/gemini-design-agent/tests -p "test_*.py" -v

      - name: Python evaluator and smoke contract tests
        run: python -m unittest discover -s Tests -p "test_*.py" -v

      - name: Validate Codex skill
        run: python scripts/validate_skill.py --json

      - name: Recorded design-quality evaluation
        run: python scripts/evaluate_design_quality.py --mode recorded --corpus public

      - name: Recorded sequential-memory evaluation
        run: python scripts/evaluate_design_quality.py --mode recorded --corpus public --sequential

      - name: Installer dry run
        run: python scripts/install_skill.py --dry-run --codex-home "${{ env.CODEX_HOME }}"

      - name: Install and verify managed skill bundle
        run: python scripts/install_skill.py --codex-home "${{ env.CODEX_HOME }}"

      - name: Installed wrapper capabilities
        run: python "${{ env.CODEX_HOME }}/skills/gemini-design-agent/gda_skill.py" capabilities

      - name: Public release audit
        if: runner.os == 'Linux'
        run: python scripts/audit_public_release.py

      - name: Release archive hygiene
        if: runner.os == 'Linux'
        run: python scripts/package_release.py --version 0.1.0 --output dist

      - name: Diff hygiene
        run: git diff --check

      - name: Docs sanity
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          grep -q "PNG and JPEG only" README.md
          grep -q "PNG/JPEG" skills/gemini-design-agent/SKILL.md
          grep -q "name: gemini-design-agent" skills/gemini-design-agent/SKILL.md
