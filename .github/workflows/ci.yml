name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift and wrapper tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2022]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Swift (macOS and Ubuntu)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@3aed395c5397f62deb91d8fe7af1418a9ae4d16f # v2.1.0
        with:
          swift-version: "6.1"

      - name: Set up Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@eeda069c5bc95ac8a9ac5cea7d4f588ae5420ca5 # v0.4.0
        with:
          swift-version: swift-6.1-release
          swift-build: 6.1-RELEASE

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Swift version
        run: swift --version

      - name: Swift tests
        run: swift test

      - name: Python wrapper compile
        run: python -m py_compile skills/gemini-design-agent/gda_skill.py skills/gemini-design-agent/gda_*.py

      - name: Python wrapper tests
        run: python -m unittest discover -s skills/gemini-design-agent/tests -p "test_*.py"

      - name: Docs sanity
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          grep -q "PNG and JPEG only" README.md
          grep -q "PNG/JPEG" skills/gemini-design-agent/SKILL.md
